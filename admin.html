<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fame Client — Админ</title>
<style>
:root{--text-color:#ebebeb;--text-color-alower:rgba(255,255,255,.48);--bg-color:#090909;--bg-second-color:#161519;--border-color:rgba(255,255,255,.08);--accent-color:#6d706e;--button-bg:color-mix(in srgb,var(--bg-second-color),black 3.5%);--btn-primary-bg:var(--accent-color);--btn-primary-border:var(--accent-color);--btn-primary-text:#ecf8f6;--transition:all .2s ease-in-out;--sm-radius:8px;--md-radius:12px;--matte-glass-bg:rgba(255,255,255,.03);--matte-glass-border:rgba(255,255,255,.07);--matte-glass-blur:18px;--matte-glass-shadow:0 4px 24px rgba(0,0,0,.18)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg-color);color:var(--text-color);font-family:"Inter","Segoe UI",system-ui,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(109,112,110,.5);border-radius:6px}
.hero-glow{position:fixed;top:-20%;left:50%;transform:translateX(-50%);width:800px;height:600px;background:radial-gradient(ellipse,rgba(109,112,110,.12) 0,transparent 70%);pointer-events:none;z-index:0}
.header{position:fixed;top:0;left:0;right:0;z-index:1000;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 40px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(9,9,9,.85);border-bottom:1px solid var(--border-color)}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text-color)}
.logo-mark{width:28px;height:28px;background:var(--accent-color);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--btn-primary-text);flex-shrink:0}
.logo-text{font-size:16px;font-weight:600;letter-spacing:-.3px}
.admin-badge{background:rgba(109,112,110,.15);color:var(--accent-color);border:1px solid rgba(109,112,110,.3);padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700}
.header-right{display:flex;align-items:center;gap:8px}
.header-nav-link{display:flex;align-items:center;gap:8px;padding:7px 14px;border-radius:var(--sm-radius);background:var(--button-bg);border:1px solid var(--border-color);color:var(--text-color-alower);font-size:13px;text-decoration:none;transition:var(--transition)}
.header-nav-link:hover{border-color:var(--accent-color);color:var(--text-color)}
.container{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:80px 20px 40px}
.tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--matte-glass-bg);border:1px solid var(--matte-glass-border);border-radius:12px;padding:4px;width:fit-content}
.tab{padding:8px 20px;border-radius:8px;border:none;background:transparent;color:var(--text-color-alower);font-size:13px;font-weight:600;cursor:pointer;transition:var(--transition)}
.tab:hover{color:var(--text-color);background:rgba(255,255,255,.05)}
.tab.active{background:var(--accent-color);color:var(--btn-primary-text)}
.panel{display:none}
.panel.active{display:block}
.dashboard-card{background:var(--matte-glass-bg);backdrop-filter:blur(var(--matte-glass-blur));-webkit-backdrop-filter:blur(var(--matte-glass-blur));border:1px solid var(--matte-glass-border);border-radius:16px;padding:20px;margin-bottom:16px;transition:all .3s ease}
.dashboard-card:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,.25)}
.card-title{font-size:11px;font-weight:700;color:var(--text-color-alower);text-transform:uppercase;letter-spacing:.1em;margin-bottom:16px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--matte-glass-bg);backdrop-filter:blur(var(--matte-glass-blur));border:1px solid var(--matte-glass-border);border-radius:14px;padding:16px;text-align:center}
.stat-val{font-size:28px;font-weight:800;margin-bottom:4px}
.stat-label{font-size:11px;color:var(--text-color-alower)}
.field-row{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field-row label{font-size:12px;color:var(--text-color-alower)}
.field-row input,.field-row select,.field-row textarea{width:100%;padding:9px 12px;background:rgba(0,0,0,.25);border:1px solid var(--border-color);border-radius:var(--sm-radius);color:var(--text-color);font-size:13px;outline:none;transition:var(--transition);font-family:inherit}
.field-row input:focus,.field-row select:focus,.field-row textarea:focus{border-color:var(--accent-color)}
.field-row select option{background:#161519}
.field-row textarea{resize:vertical;min-height:70px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 14px;font-size:11px;font-weight:700;color:var(--text-color-alower);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--border-color)}
td{padding:10px 14px;border-bottom:1px solid var(--border-color);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700}
.badge-active{background:rgba(74,222,128,.1);color:#7cffb3;border:1px solid rgba(74,222,128,.25)}
.badge-expired{background:rgba(255,255,255,.06);color:var(--text-color-alower);border:1px solid var(--border-color)}
.badge-lifetime{background:rgba(245,158,11,.1);color:#f59e0b;border:1px solid rgba(245,158,11,.25)}
.uid-cell{font-family:monospace;font-size:11px;color:var(--text-color-alower);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;transition:var(--transition)}
.uid-cell:hover{color:var(--accent-color)}
.search-row{display:flex;gap:8px;margin-bottom:16px}
.search-row input{flex:1;padding:9px 14px;background:rgba(0,0,0,.25);border:1px solid var(--border-color);border-radius:var(--sm-radius);color:var(--text-color);font-size:13px;outline:none;transition:var(--transition)}
.search-row input:focus{border-color:var(--accent-color)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--sm-radius);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;text-decoration:none}
.btn-primary{background:var(--btn-primary-bg);color:var(--btn-primary-text);border:1px solid var(--btn-primary-border)}
.btn-primary:hover{opacity:.85;transform:translateY(-1px)}
.btn-danger{background:transparent;color:#f87171;border:1px solid rgba(248,113,113,.3)}
.btn-danger:hover{background:rgba(248,113,113,.08)}
.btn-ghost{background:transparent;border:1px solid var(--border-color);color:var(--text-color-alower)}
.btn-ghost:hover{border-color:var(--accent-color);color:var(--text-color)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-green{background:rgba(74,222,128,.1);color:#7cffb3;border:1px solid rgba(74,222,128,.25)}
.btn-green:hover{background:rgba(74,222,128,.18)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(22,21,25,.95);border:1px solid var(--border-color);border-radius:12px;padding:12px 20px;font-size:13px;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.ok{border-color:rgba(74,222,128,.4);color:#7cffb3}
.toast.err{border-color:rgba(248,113,113,.4);color:#f87171}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border-color);border-top-color:var(--accent-color);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-state{display:flex;align-items:center;justify-content:center;min-height:60vh;gap:12px;color:var(--text-color-alower);font-size:14px}
@keyframes fadeInScale{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.animate-fadeInScale{animation:fadeInScale .5s ease-out forwards;opacity:0}
@media(max-width:640px){.header{padding:0 16px}.container{padding:80px 12px 32px}.stat-grid{grid-template-columns:repeat(2,1fr)}.tabs{flex-wrap:wrap}}
</style>
</head>
<body>

<header class="header">
  <a href="index.html" class="logo">
    <div class="logo-mark">F</div>
    <span class="logo-text">Fame Client</span>
  </a>
  <div class="header-right">
    <a href="dashboard.html" class="header-nav-link">← Кабинет</a>
    <div class="admin-badge">ADMIN</div>
    <button id="logoutBtn" class="header-nav-link" style="cursor:pointer;border:none;background:var(--button-bg);color:var(--text-color-alower)">Выйти</button>
  </div>
</header>

<div class="container" id="mainContainer">
  <div class="loading-state">
    <div class="spinner"></div> Проверка доступа...
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, onAuthStateChanged, signOut, browserLocalPersistence, setPersistence } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, updateDoc, query, orderBy, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

// ══════════════════════════════════════════════
// ЗАМЕНИ НА СВОИ ЗНАЧЕНИЯ ИЗ FIREBASE CONSOLE
const firebaseConfig = {
  apiKey:            "AIzaSyAiZv5BNz7Kj0-b41LHLB7P3Y_w9BupqqQ",
  authDomain:        "fameclient-a8735.firebaseapp.com",
  projectId:         "fameclient-a8735",
  storageBucket:     "fameclient-a8735.firebasestorage.app",
  messagingSenderId: "1071684024649",
  appId:             "1:1071684024649:web:e2ccb6a284ba2e4d52c298"
};
// ADMIN emails — только эти люди видят эту страницу
const ADMIN_EMAILS = ['whydoulive@yandex.ru'];
// ══════════════════════════════════════════════

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

const PLAN_LABELS = {
  '1214_basic':    'Basic 1.21.4',
  '1214_premium':  'Premium 1.21.4',
  '1214_lifetime': 'Lifetime 1.21.4',
};

// Admin actions log
async function logAction(action, details) {
  try {
    await addDoc(collection(db, 'admin_logs'), {
      action: action,
      details: details,
      admin_email: auth.currentUser?.email || 'unknown',
      timestamp: new Date().toISOString()
    });
  } catch (e) {
    console.error('Failed to log action:', e);
  }
}

function toast(msg, ok = true) {
  const t = document.getElementById('toast');
  if (!t) {
    console.error('[Toast] Element not found:', msg);
    alert(msg);
    return;
  }
  t.textContent = msg;
  t.className = 'toast show ' + (ok ? 'ok' : 'err');
  setTimeout(() => t.className = 'toast', 3000);
}

function formatDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric' });
}

function isExpired(d) {
  if (!d) return false;
  return new Date(d) < new Date();
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => toast('Скопировано'));
}

// ── RENDER ADMIN UI ──────────────────────────────────────────────────────────
async function renderAdmin() {
  // Load all data
  const [subsSnap, profilesSnap, bansSnap, logsSnap] = await Promise.all([
    getDocs(query(collection(db, 'subscriptions'), orderBy('created_at', 'desc'))),
    getDocs(collection(db, 'profiles')),
    getDocs(query(collection(db, 'bans'), orderBy('banned_at', 'desc'))),
    getDocs(query(collection(db, 'admin_logs'), orderBy('timestamp', 'desc')))
  ]);

  const subs     = [];
  subsSnap.forEach(d => subs.push({ id: d.id, ...d.data() }));

  const profiles = {};
  profilesSnap.forEach(d => { profiles[d.id] = d.data(); });

  const bans = [];
  bansSnap.forEach(d => bans.push({ id: d.id, ...d.data() }));

  const logs = [];
  logsSnap.forEach(d => logs.push({ id: d.id, ...d.data() }));

  // Update ban count badge
  const banCountEl = document.getElementById('banCount');
  if (banCountEl) banCountEl.textContent = bans.length;

  const now        = new Date();
  const activeSubs = subs.filter(s => !isExpired(s.expires_at));
  const expiredSubs= subs.filter(s => isExpired(s.expires_at));

  document.getElementById('mainContainer').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">
      <h1 style="font-size:20px;font-weight:800">Панель администратора</h1>
      <button class="btn btn-primary btn-sm" id="refreshBtn">↻ Обновить</button>
    </div>

    <!-- STATS -->
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-val" style="color:var(--accent-color)">${Object.keys(profiles).length}</div><div class="stat-label">Пользователей</div></div>
      <div class="stat-card"><div class="stat-val" style="color:#7cffb3">${activeSubs.length}</div><div class="stat-label">Активных подписок</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--text-color-alower)">${expiredSubs.length}</div><div class="stat-label">Истёкших подписок</div></div>
      <div class="stat-card"><div class="stat-val" style="color:#f59e0b">${subs.filter(s=>s.plan?.includes('lifetime')).length}</div><div class="stat-label">Lifetime</div></div>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('subs',this)">Подписки</button>
      <button class="tab" onclick="switchTab('users',this)">Пользователи</button>
      <button class="tab" onclick="switchTab('bans',this)">🚫 Баны <span id="banCount" class="badge" style="margin-left:4px">0</span></button>
      <button class="tab" onclick="switchTab('logs',this)">📋 Логи</button>
      <button class="tab" onclick="switchTab('add',this)">➕ Добавить</button>
      <button class="tab" onclick="switchTab('keys',this)">🔑 Ключи</button>
    </div>

    <!-- SUBSCRIPTIONS TAB -->
    <div class="panel active" id="tab-subs">
      <div class="search-row">
        <input type="text" id="subSearch" placeholder="Поиск по email, UID, плану..." oninput="filterSubs()">
      </div>
      <div class="card" style="padding:0;overflow:hidden">
        <table id="subsTable">
          <thead>
            <tr>
              <th>Пользователь</th>
              <th>UID</th>
              <th>План</th>
              <th>Статус</th>
              <th>Истекает</th>
              <th>Действия</th>
            </tr>
          </thead>
          <tbody id="subsTbody">
            ${subs.map(s => {
              const profile = profiles[s.user_id];
              const nick    = profile?.nickname || '—';
              const email   = profile?.email || s.user_id;
              const expired = isExpired(s.expires_at);
              const lifetime= !s.expires_at;
              const badge   = lifetime ? '<span class="badge badge-lifetime">Lifetime</span>'
                            : expired  ? '<span class="badge badge-expired">Истекла</span>'
                            :            '<span class="badge badge-active">Активна</span>';
              return `<tr data-search="${email} ${s.user_id} ${s.plan} ${nick}">
                <td><div style="font-weight:600">${nick}</div><div style="font-size:11px;color:var(--text-color-alower)">${email}</div></td>
                <td><div class="uid-cell" title="${s.user_id}" onclick="copyText('${s.user_id}')">${s.user_id}</div></td>
                <td>${PLAN_LABELS[s.plan] || s.plan}</td>
                <td>${badge}</td>
                <td>${lifetime ? '♾ Навсегда' : formatDate(s.expires_at)}</td>
                <td style="display:flex;gap:6px;flex-wrap:wrap">
                  <button class="btn btn-sm btn-ghost" onclick="extendSub('${s.id}','${s.user_id}')">+30 дней</button>
                  <button class="btn btn-sm btn-danger" onclick="deleteSub('${s.id}')">Удалить</button>
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
        ${subs.length === 0 ? '<div class="empty" style="padding:32px;text-align:center;color:var(--text-color-alower)">Нет подписок</div>' : ''}
      </div>
    </div>

    <!-- USERS TAB -->
    <div class="panel" id="tab-users">
      <div class="search-row">
        <input type="text" id="userSearch" placeholder="Поиск по email, никнейму, UID..." oninput="filterUsers()">
      </div>
      <div class="card" style="padding:0;overflow:hidden">
        <table>
          <thead>
            <tr><th>Никнейм</th><th>Email</th><th>UID</th><th>HWID</th><th>Подписок</th><th>Действия</th></tr>
          </thead>
          <tbody id="usersTbody">
            ${Object.entries(profiles).map(([uid, p]) => {
              const userSubs = subs.filter(s => s.user_id === uid && !isExpired(s.expires_at));
              return `<tr data-search="${p.email || ''} ${p.nickname || ''} ${uid}">
                <td style="font-weight:600">${p.nickname || '—'}</td>
                <td style="color:var(--text-color-alower)">${p.email || '—'}</td>
                <td><div class="uid-cell" title="${uid}" onclick="copyText('${uid}')">${uid}</div></td>
                <td style="font-family:monospace;font-size:11px;color:var(--text-color-alower)">${p.hwid ? p.hwid.substring(0,16)+'...' : 'Нет'}</td>
                <td><span class="badge ${userSubs.length > 0 ? 'badge-active' : 'badge-expired'}">${userSubs.length} активных</span></td>
                <td style="display:flex;gap:6px;flex-wrap:wrap">
                  <button class="btn btn-sm btn-danger" onclick="banUser('${uid}', '${p.email || ''}', '${p.nickname || ''}')">🚫 Бан</button>
                  <button class="btn btn-sm btn-ghost" onclick="editUser('${uid}')">✏️ Edit</button>
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
        ${Object.keys(profiles).length === 0 ? '<div style="padding:32px;text-align:center;color:var(--text-color-alower)">Нет пользователей</div>' : ''}
      </div>
    </div>

    <!-- BANS TAB -->
    <div class="panel" id="tab-bans">
      <div class="search-row">
        <input type="text" id="banSearch" placeholder="Поиск по email, UID, причине..." oninput="filterBans()">
      </div>
      <div class="card" style="padding:0;overflow:hidden">
        <table>
          <thead>
            <tr><th>Пользователь</th><th>UID</th><th>Причина</th><th>Забанил</th><th>Дата</th><th>Действия</th></tr>
          </thead>
          <tbody id="bansTbody">
            ${bans.map(b => {
              const profile = profiles[b.user_id];
              return `<tr data-search="${b.email || ''} ${b.user_id} ${b.reason || ''}">
                <td>
                  <div style="font-weight:600">${b.nickname || profile?.nickname || '—'}</div>
                  <div style="font-size:11px;color:var(--text-color-alower)">${b.email || profile?.email || '—'}</div>
                </td>
                <td><div class="uid-cell" title="${b.user_id}" onclick="copyText('${b.user_id}')">${b.user_id}</div></td>
                <td>${b.reason || '—'}</td>
                <td style="font-size:11px;color:var(--text-color-alower)">${b.banned_by || '—'}</td>
                <td style="font-size:11px;color:var(--text-color-alower)">${formatDate(b.banned_at)}</td>
                <td><button class="btn btn-sm btn-primary" onclick="unbanUser('${b.id}', '${b.user_id}')">✓ Разбан</button></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
        ${bans.length === 0 ? '<div style="padding:32px;text-align:center;color:var(--text-color-alower)">Нет заблокированных пользователей</div>' : ''}
      </div>
    </div>

    <!-- LOGS TAB -->
    <div class="panel" id="tab-logs">
      <div class="search-row">
        <input type="text" id="logSearch" placeholder="Поиск по действию, админу..." oninput="filterLogs()">
      </div>
      <div class="card" style="padding:0;overflow:hidden;max-height:500px;overflow-y:auto">
        <table>
          <thead>
            <tr><th>Время</th><th>Админ</th><th>Действие</th><th>Детали</th></tr>
          </thead>
          <tbody id="logsTbody">
            ${logs.map(l => `<tr data-search="${l.action} ${l.admin_email} ${l.details || ''}">
              <td style="font-size:11px;color:var(--text-color-alower);white-space:nowrap">${new Date(l.timestamp).toLocaleString('ru-RU')}</td>
              <td style="font-size:11px;color:var(--text-color-alower)">${l.admin_email}</td>
              <td><span class="badge badge-active">${l.action}</span></td>
              <td style="font-size:11px;color:var(--text-color-alower)">${l.details || '—'}</td>
            </tr>`).join('')}
          </tbody>
        </table>
        ${logs.length === 0 ? '<div style="padding:32px;text-align:center;color:var(--text-color-alower)">Нет записей в логе</div>' : ''}
      </div>
    </div>

    <!-- ADD SUBSCRIPTION TAB -->
    <div class="panel" id="tab-add">
      <div class="card" style="max-width:480px">
        <div class="card-title">Добавить подписку</div>
        <div class="field-row">
          <label>UID пользователя</label>
          <input type="text" id="addUid" placeholder="Скопируй из таблицы Пользователи или из кабинета">
        </div>
        <div class="field-row">
          <label>Или найди по email</label>
          <div style="display:flex;gap:8px">
            <input type="email" id="searchEmail" placeholder="user@mail.ru" style="flex:1">
            <button class="btn btn-ghost btn-sm" id="findUserBtn">Найти</button>
          </div>
          <div id="foundUser" style="font-size:12px;margin-top:4px;min-height:16px"></div>
        </div>
        <div class="field-row">
          <label>План</label>
          <select id="addPlan">
            <option value="1214_basic">Basic 1.21.4 — 599₽/мес</option>
            <option value="1214_premium" selected>Premium 1.21.4 — 799₽/мес</option>
            <option value="1214_lifetime">Lifetime 1.21.4 — 999₽</option>
          </select>
        </div>
        <div class="field-row" id="expiresRow">
          <label>Срок действия</label>
          <select id="addDuration">
            <option value="30">30 дней</option>
            <option value="60">60 дней</option>
            <option value="90">90 дней</option>
            <option value="180">180 дней</option>
            <option value="365">1 год</option>
            <option value="0">Навсегда (Lifetime)</option>
          </select>
        </div>
        <button class="btn btn-primary" id="addSubBtn" style="width:100%;justify-content:center;margin-top:4px">Добавить подписку</button>
      </div>
    </div>

    <!-- KEYS TAB -->
    <div class="panel" id="tab-keys">
      <div class="card" style="margin-bottom:20px">
        <div class="card-title">Создать ключ</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 140px auto;gap:10px;align-items:end;flex-wrap:wrap">
          <div class="field-row" style="margin-bottom:0">
            <label>План</label>
            <select id="keyPlan">
              <option value="1214_basic">Basic 1.21.4 — 599₽/мес</option>
              <option value="1214_premium" selected>Premium 1.21.4 — 799₽/мес</option>
              <option value="1214_lifetime">Lifetime 1.21.4 — 999₽</option>
            </select>
          </div>
          <div class="field-row" style="margin-bottom:0">
            <label>Срок (дней, 0 = навсегда)</label>
            <input type="number" id="keyDays" value="30" min="0" max="3650">
          </div>
          <div class="field-row" style="margin-bottom:0">
            <label>Кол-во</label>
            <input type="number" id="keyCount" value="1" min="1" max="100">
          </div>
          <button class="btn btn-primary" id="generateKeysBtn" style="white-space:nowrap">Создать</button>
        </div>
        <div id="generatedKeysArea" style="margin-top:14px;display:none">
          <div style="font-size:11px;color:var(--text-color-alower);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Сгенерированные ключи (кликни на ключ = копировать)</div>
          <div id="generatedKeysList" style="display:flex;flex-wrap:wrap;gap:8px"></div>
        </div>
      </div>
      <div class="card" style="padding:0;overflow:hidden">
        <div style="padding:12px 16px;border-bottom:1px solid var(--border-color);display:flex;align-items:center;justify-content:space-between">
          <span style="font-size:12px;font-weight:700;color:var(--text-color-alower);text-transform:uppercase;letter-spacing:.5px">Все ключи</span>
          <span id="keysTotalBadge" style="font-size:11px;padding:2px 8px;border-radius:6px;background:rgba(124,106,247,.15);color:var(--accent-color)">0 ключей</span>
        </div>
        <table>
          <thead>
            <tr><th>Ключ</th><th>План</th><th>Дней</th><th>Статус</th><th>Создан</th><th>Активирован</th><th></th></tr>
          </thead>
          <tbody id="keysTbody">
            <tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text-color-alower)">Загрузка...</td></tr>
          </tbody>
        </table>
      </div>
    </div>`;

  // Events
  document.getElementById('refreshBtn').onclick = () => renderAdmin();
  document.getElementById('logoutBtn').onclick = () =>
    signOut(auth).then(() => window.location.href = 'index.html')['catch'](e => { toast('Ошибка выхода: ' + (e.message || 'неизвестно'), false); console.error('[Admin] SignOut error:', e); });

  // Auto-hide expires for lifetime plan
  document.getElementById('addPlan').onchange = () => {
    const isLifetime = document.getElementById('addPlan').value.includes('lifetime');
    document.getElementById('expiresRow').style.display = isLifetime ? 'none' : '';
    if (isLifetime) document.getElementById('addDuration').value = '0';
  };

  // Find user by email
  document.getElementById('findUserBtn').onclick = async () => {
    const email = document.getElementById('searchEmail').value.trim().toLowerCase();
    if (!email) return;
    const found = Object.entries(profiles).find(([, p]) => p.email?.toLowerCase() === email);
    const foundUserEl = document.getElementById('foundUser');
    const addUidEl = document.getElementById('addUid');
    if (found) {
      if (addUidEl) addUidEl.value = found[0];
      if (foundUserEl) {
        foundUserEl.style.color = '#7cffb3';
        foundUserEl.textContent = `✓ Найден: ${found[1].nickname || email}`;
      }
    } else {
      if (foundUserEl) {
        foundUserEl.style.color = '#ff6b6b';
        foundUserEl.textContent = 'Пользователь не найден';
      }
    }
  };

  // Add subscription
  document.getElementById('addSubBtn').onclick = async () => {
    const uid      = document.getElementById('addUid').value.trim();
    const plan     = document.getElementById('addPlan').value;
    const duration = parseInt(document.getElementById('addDuration').value);
    const btn      = document.getElementById('addSubBtn');

    if (!uid) { toast('Введи UID пользователя', false); return; }

    let expires_at = null;
    if (duration > 0) {
      const d = new Date();
      d.setDate(d.getDate() + duration);
      expires_at = d.toISOString();
    }

    if (btn) { btn.textContent = 'Добавляем...'; btn.disabled = true; }
    try {
      await addDoc(collection(db, 'subscriptions'), {
        user_id:    uid,
        plan:       plan,
        expires_at: expires_at,
        created_at: new Date().toISOString()
      });
      toast(`Подписка ${PLAN_LABELS[plan]} добавлена`);
      const addUidEl2 = document.getElementById('addUid');
      const foundUserEl2 = document.getElementById('foundUser');
      if (addUidEl2) addUidEl2.value = '';
      if (foundUserEl2) foundUserEl2.textContent = '';
      setTimeout(() => renderAdmin(), 800);
    } catch(e) {
      toast('Ошибка: ' + e.message, false);
      if (btn) { btn.textContent = 'Добавить подписку'; btn.disabled = false; }
    }
  };

  // Make functions global
  window.copyText = copyText;
  window.deleteKey = deleteKey;

  // ── KEY SYSTEM ──────────────────────────────────────────────────────────────
  function generateKey() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let key = 'FAME-';
    for (let i = 0; i < 4; i++) {
      for (let j = 0; j < 4; j++) {
        key += chars[Math.floor(Math.random() * chars.length)];
      }
      if (i < 3) key += '-';
    }
    return key;
  }

  async function loadKeys() {
    const snap = await getDocs(query(collection(db, 'keys'), orderBy('created_at', 'desc')));
    const keys = [];
    snap.forEach(d => keys.push({ id: d.id, ...d.data() }));

    document.getElementById('keysTotalBadge').textContent = keys.length + ' ключей';

    const tbody = document.getElementById('keysTbody');
    if (keys.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text-color-alower)">Нет ключей</td></tr>';
      return;
    }

    tbody.innerHTML = keys.map(k => {
      const used = k.used;
      const usedByEmail = used ? (k.used_by_email || '—') : '—';
      const usedAt = k.used_at ? formatDate(k.used_at) : '—';
      const badge = used
        ? `<span class="badge" style="background:rgba(68,68,90,.3);color:var(--text-color-alower)">Использован</span>`
        : `<span class="badge badge-active">Активен</span>`;
      const daysLabel = k.duration_days === 0 ? '∞' : k.duration_days;
      const planLabel = PLAN_LABELS[k.plan] || k.plan;

      return `<tr data-search="${k.key} ${planLabel} ${used ? 'использован' : 'активен'}">
        <td>
          <div class="uid-cell" title="${k.key}" style="cursor:pointer;font-weight:700;color:var(--accent-color);font-size:12px"
               onclick="copyText('${k.key}')">${k.key}</div>
        </td>
        <td>${planLabel}</td>
        <td>${daysLabel}</td>
        <td>${badge}</td>
        <td style="font-size:11px;color:var(--text-color-alower)">${formatDate(k.created_at)}</td>
        <td style="font-size:11px;color:var(--text-color-alower)">
          ${usedAt}
          ${used ? `<div style="font-size:10px;color:var(--text-color-alower);margin-top:2px">${usedByEmail}</div>` : ''}
        </td>
        <td>
          <button class="btn btn-sm btn-danger" onclick="deleteKey('${k.id}', '${k.key}')">✕</button>
        </td>
      </tr>`;
    }).join('');
  }

  async function deleteKey(id, key) {
    if (!confirm('Удалить ключ ' + key + '?')) return;
    try {
      await deleteDoc(doc(db, 'keys', id));
      await logAction('delete_key', `Deleted key ${key}`);
      toast('Ключ удален');
      loadKeys();
    } catch (e) {
      toast('Ошибка: ' + e.message, false);
    }
  }

  // Generate keys
  document.getElementById('generateKeysBtn').onclick = async () => {
    const plan = document.getElementById('keyPlan').value;
    const days = parseInt(document.getElementById('keyDays').value) || 30;
    const count = Math.min(parseInt(document.getElementById('keyCount').value) || 1, 100);
    const btn = document.getElementById('generateKeysBtn');

    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div>';

    try {
      const newKeys = [];
      for (let i = 0; i < count; i++) {
        const key = generateKey();
        await addDoc(collection(db, 'keys'), {
          key: key,
          plan: plan,
          duration_days: days,
          created_at: new Date().toISOString(),
          created_by: auth.currentUser.email,
          used: false,
          used_by: null,
          used_by_email: null,
          used_at: null
        });
        newKeys.push(key);
      }
      await logAction('generate_keys', `Generated ${count} key(s) for plan ${plan}, ${days} days`);

      // Show generated keys
      const area = document.getElementById('generatedKeysArea');
      const list = document.getElementById('generatedKeysList');
      area.style.display = 'block';
      list.innerHTML = newKeys.map(k =>
        `<span class="badge badge-active" style="padding:5px 10px;font-size:12px;cursor:pointer;font-family:monospace"
               onclick="copyText('${k}')" title="Кликни чтобы скопировать">${k}</span>`
      ).join('');

      toast('Создано ключей: ' + count);
      loadKeys();
    } catch (e) {
      toast('Ошибка: ' + e.message, false);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Создать';
    }
  };

  // Load keys when tab opens
  loadKeys();

  // ── SUBSCRIPTION SYSTEM ─────────────────────────────────────────────────────
  window.deleteSub = async (id) => {
    if (!confirm('Удалить подписку?')) return;
    await deleteDoc(doc(db, 'subscriptions', id));
    toast('Подписка удалена');
    setTimeout(() => renderAdmin(), 500);
  };

  window.extendSub = async (id, userId) => {
    const subDoc = await getDoc(doc(db, 'subscriptions', id));
    const data   = subDoc.data();
    const base   = data.expires_at && new Date(data.expires_at) > new Date() ? new Date(data.expires_at) : new Date();
    base.setDate(base.getDate() + 30);
    await updateDoc(doc(db, 'subscriptions', id), { expires_at: base.toISOString() });
    toast('+30 дней добавлено');
    setTimeout(() => renderAdmin(), 500);
  };

  window.switchTab = (name, btn) => {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    btn.classList.add('active');
  };

  window.filterSubs = () => {
    const q = document.getElementById('subSearch').value.toLowerCase();
    document.querySelectorAll('#subsTbody tr').forEach(tr => {
      tr.style.display = tr.dataset.search?.toLowerCase().includes(q) ? '' : 'none';
    });
  };

  window.filterUsers = () => {
    const q = document.getElementById('userSearch').value.toLowerCase();
    document.querySelectorAll('#usersTbody tr').forEach(tr => {
      tr.style.display = tr.dataset.search?.toLowerCase().includes(q) ? '' : 'none';
    });
  };

  window.filterBans = () => {
    const q = document.getElementById('banSearch').value.toLowerCase();
    document.querySelectorAll('#bansTbody tr').forEach(tr => {
      tr.style.display = tr.dataset.search?.toLowerCase().includes(q) ? '' : 'none';
    });
  };

  window.filterLogs = () => {
    const q = document.getElementById('logSearch').value.toLowerCase();
    document.querySelectorAll('#logsTbody tr').forEach(tr => {
      tr.style.display = tr.dataset.search?.toLowerCase().includes(q) ? '' : 'none';
    });
  };

  window.banUser = async (uid, email, nickname) => {
    const reason = prompt(`Причина блокировки ${nickname || email || uid}?`);
    if (reason === null) return; // cancelled

    try {
      await addDoc(collection(db, 'bans'), {
        user_id: uid,
        email: email,
        nickname: nickname,
        reason: reason || 'Нарушение правил',
        banned_by: auth.currentUser.email,
        banned_at: new Date().toISOString()
      });
      await logAction('ban', `Banned user ${uid} - ${nickname || email}`);
      toast('Пользователь заблокирован');
      setTimeout(() => renderAdmin(), 500);
    } catch (e) {
      toast('Ошибка блокировки: ' + e.message, false);
    }
  };

  window.unbanUser = async (banId, uid) => {
    if (!confirm('Разблокировать пользователя?')) return;
    try {
      await deleteDoc(doc(db, 'bans', banId));
      await logAction('unban', `Unbanned user ${uid}`);
      toast('Пользователь разблокирован');
      setTimeout(() => renderAdmin(), 500);
    } catch (e) {
      toast('Ошибка разблокировки: ' + e.message, false);
    }
  };

  window.editUser = async (uid) => {
    const profile = profiles[uid];
    const newNick = prompt('Новый никнейм:', profile?.nickname || '');
    if (newNick === null) return;

    try {
      await updateDoc(doc(db, 'profiles', uid), { nickname: newNick });
      await logAction('edit_user', `Updated nickname for ${uid} to ${newNick}`);
      toast('Пользователь обновлен');
      setTimeout(() => renderAdmin(), 500);
    } catch (e) {
      toast('Ошибка обновления: ' + e.message, false);
    }
  };
}

// ── AUTH CHECK ───────────────────────────────────────────────────────────────
function authReady() {
  return new Promise((resolve) => {
    const timer = setTimeout(() => resolve(null), 15000);
    auth.onAuthStateChanged(function(user) { clearTimeout(timer); resolve(user); }, function(err) { clearTimeout(timer); resolve(null); });
  });
}

(async () => {
  const user = await authReady();

  if (!user) {
    window.location.href = 'index.html';
    return;
  }

  if (!ADMIN_EMAILS.includes(user.email)) {
    document.getElementById('mainContainer').innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:16px">
        <div style="font-size:48px">🚫</div>
        <div style="font-size:18px;font-weight:700">Нет доступа</div>
        <div style="color:var(--text-color-alower);font-size:14px">Твой email: <code style="color:var(--accent-color)">${user.email}</code></div>
        <div style="color:var(--text-color-alower);font-size:13px">Добавь его в ADMIN_EMAILS в admin.html</div>
        <a href="dashboard.html" class="btn btn-primary">← В кабинет</a>
      </div>`;
    return;
  }

  document.getElementById('logoutBtn').onclick = () =>
    signOut(auth).then(() => window.location.href = 'index.html');

  try {
    await renderAdmin();
  } catch (err) {
    document.getElementById('mainContainer').innerHTML =
      `<div style="padding:32px;color:#ff6b6b;font-size:13px">
        <b>Ошибка загрузки админки:</b><br><br>
        <code style="background:rgba(0,0,0,.4);padding:8px 12px;border-radius:6px;display:block;word-break:break-all">${err.code || ''}: ${err.message}</code>
        <br><a href="index.html" style="color:var(--accent-color)">← На главную</a>
      </div>`;
  }
})();
</script>
</body>
</html>
