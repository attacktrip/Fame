<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fame Client — Админ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0c;--card:#13131a;--card2:#1a1a24;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --text:#e8e8f0;--dim:#8888a0;--muted:#44445a;
  --accent:#7c6af7;--accent2:#a78bfa;--green:#4ade80;--red:#f87171;--gold:#f59e0b;--orange:#fb923c;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(124,106,247,.12),transparent);pointer-events:none;z-index:0}
nav{position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);background:rgba(10,10,12,.9);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:56px}
.nav-logo{font-weight:700;font-size:17px;color:var(--text)}
.nav-logo span{color:var(--accent)}
.nav-badge{background:rgba(251,146,60,.15);color:var(--orange);border:1px solid rgba(251,146,60,.3);padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700}
.nav-right{display:flex;align-items:center;gap:10px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;text-decoration:none}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-danger{background:transparent;border:1px solid var(--red);color:var(--red)}
.btn-danger:hover{background:rgba(248,113,113,.1)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--dim)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.container{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:28px 20px}
.tabs{display:flex;gap:4px;margin-bottom:24px;background:rgba(0,0,0,.3);border-radius:10px;padding:4px;width:fit-content}
.tab{padding:8px 20px;border-radius:7px;border:none;background:transparent;color:var(--dim);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.tab.active{background:var(--card2);color:var(--text);border:1px solid var(--border2)}
.panel{display:none}
.panel.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
.card-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:16px}
.field-row{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.field-row label{font-size:11px;color:var(--dim)}
.field-row input,.field-row select{background:rgba(0,0,0,.4);border:1px solid var(--border2);border-radius:7px;padding:9px 12px;color:var(--text);font-size:13px;outline:none;transition:border-color .2s;width:100%}
.field-row input:focus,.field-row select:focus{border-color:var(--accent)}
.field-row select option{background:#13131a}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--border)}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700}
.badge-active{background:rgba(74,222,128,.15);color:var(--green)}
.badge-expired{background:rgba(68,68,90,.3);color:var(--muted)}
.badge-lifetime{background:rgba(245,158,11,.15);color:var(--gold)}
.uid-cell{font-family:monospace;font-size:11px;color:var(--dim);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.uid-cell:hover{color:var(--accent)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:12px 18px;font-size:13px;z-index:999;transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--red);color:var(--red)}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
.stat-val{font-size:28px;font-weight:800;margin-bottom:2px}
.stat-label{font-size:11px;color:var(--dim)}
.search-row{display:flex;gap:8px;margin-bottom:16px}
.search-row input{flex:1;background:rgba(0,0,0,.4);border:1px solid var(--border2);border-radius:8px;padding:9px 14px;color:var(--text);font-size:13px;outline:none}
.search-row input:focus{border-color:var(--accent)}
@media(max-width:640px){nav{padding:0 16px}.container{padding:16px 12px}table{font-size:12px}th,td{padding:8px 8px}}
</style>
</head>
<body>

<nav>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="nav-logo"><span>Fame</span> Client</div>
    <div class="nav-badge">ADMIN</div>
  </div>
  <div class="nav-right">
    <a href="dashboard.html" class="btn btn-ghost btn-sm">← Кабинет</a>
    <button id="logoutBtn" class="btn btn-sm" style="border:1px solid var(--border2);color:var(--dim)">Выйти</button>
  </div>
</nav>

<div class="container" id="mainContainer">
  <div style="display:flex;align-items:center;justify-content:center;min-height:60vh;gap:10px;color:var(--dim)">
    <div class="spinner"></div> Проверка доступа...
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, onAuthStateChanged, signOut, browserLocalPersistence, setPersistence } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, updateDoc, query, orderBy, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

// ══════════════════════════════════════════════
// ЗАМЕНИ НА СВОИ ЗНАЧЕНИЯ ИЗ FIREBASE CONSOLE
const firebaseConfig = {
  apiKey:            "ТВОЙ_API_KEY",
  authDomain:        "ТВОЙ_PROJECT.firebaseapp.com",
  projectId:         "ТВОЙ_PROJECT_ID",
  storageBucket:     "ТВОЙ_PROJECT.appspot.com",
  messagingSenderId: "ТВОЙ_SENDER_ID",
  appId:             "ТВОЙ_APP_ID"
};
// ADMIN emails — только эти люди видят эту страницу
const ADMIN_EMAILS = ['whydoulive@yandex.ru', 'semyon.klementev@yandex.ru'];
// ══════════════════════════════════════════════

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

const PLAN_LABELS = {
  '1165_basic':    'Basic 1.16.5',
  '1165_premium':  'Premium 1.16.5',
  '1165_lifetime': 'Lifetime 1.16.5',
  '1214_basic':    'Basic 1.21.4',
  '1214_premium':  'Premium 1.21.4',
  '1214_lifetime': 'Lifetime 1.21.4',
};

function toast(msg, ok = true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (ok ? 'ok' : 'err');
  setTimeout(() => t.className = 'toast', 3000);
}

function formatDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric' });
}

function isExpired(d) {
  if (!d) return false;
  return new Date(d) < new Date();
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => toast('Скопировано'));
}

// ── RENDER ADMIN UI ──────────────────────────────────────────────────────────
async function renderAdmin() {
  // Load all data
  const [subsSnap, profilesSnap] = await Promise.all([
    getDocs(query(collection(db, 'subscriptions'), orderBy('created_at', 'desc'))),
    getDocs(collection(db, 'profiles'))
  ]);

  const subs     = [];
  subsSnap.forEach(d => subs.push({ id: d.id, ...d.data() }));

  const profiles = {};
  profilesSnap.forEach(d => { profiles[d.id] = d.data(); });

  const now        = new Date();
  const activeSubs = subs.filter(s => !isExpired(s.expires_at));
  const expiredSubs= subs.filter(s => isExpired(s.expires_at));

  document.getElementById('mainContainer').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">
      <h1 style="font-size:20px;font-weight:800">Панель администратора</h1>
      <button class="btn btn-primary btn-sm" id="refreshBtn">↻ Обновить</button>
    </div>

    <!-- STATS -->
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-val" style="color:var(--accent)">${Object.keys(profiles).length}</div><div class="stat-label">Пользователей</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--green)">${activeSubs.length}</div><div class="stat-label">Активных подписок</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--muted)">${expiredSubs.length}</div><div class="stat-label">Истёкших подписок</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--gold)">${subs.filter(s=>s.plan?.includes('lifetime')).length}</div><div class="stat-label">Lifetime</div></div>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('subs',this)">Подписки</button>
      <button class="tab" onclick="switchTab('users',this)">Пользователи</button>
      <button class="tab" onclick="switchTab('add',this)">➕ Добавить подписку</button>
    </div>

    <!-- SUBSCRIPTIONS TAB -->
    <div class="panel active" id="tab-subs">
      <div class="search-row">
        <input type="text" id="subSearch" placeholder="Поиск по email, UID, плану..." oninput="filterSubs()">
      </div>
      <div class="card" style="padding:0;overflow:hidden">
        <table id="subsTable">
          <thead>
            <tr>
              <th>Пользователь</th>
              <th>UID</th>
              <th>План</th>
              <th>Статус</th>
              <th>Истекает</th>
              <th>Действия</th>
            </tr>
          </thead>
          <tbody id="subsTbody">
            ${subs.map(s => {
              const profile = profiles[s.user_id];
              const nick    = profile?.nickname || '—';
              const email   = profile?.email || s.user_id;
              const expired = isExpired(s.expires_at);
              const lifetime= !s.expires_at;
              const badge   = lifetime ? '<span class="badge badge-lifetime">Lifetime</span>'
                            : expired  ? '<span class="badge badge-expired">Истекла</span>'
                            :            '<span class="badge badge-active">Активна</span>';
              return `<tr data-search="${email} ${s.user_id} ${s.plan} ${nick}">
                <td><div style="font-weight:600">${nick}</div><div style="font-size:11px;color:var(--dim)">${email}</div></td>
                <td><div class="uid-cell" title="${s.user_id}" onclick="copyText('${s.user_id}')">${s.user_id}</div></td>
                <td>${PLAN_LABELS[s.plan] || s.plan}</td>
                <td>${badge}</td>
                <td>${lifetime ? '♾ Навсегда' : formatDate(s.expires_at)}</td>
                <td style="display:flex;gap:6px;flex-wrap:wrap">
                  <button class="btn btn-sm btn-ghost" onclick="extendSub('${s.id}','${s.user_id}')">+30 дней</button>
                  <button class="btn btn-sm btn-danger" onclick="deleteSub('${s.id}')">Удалить</button>
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
        ${subs.length === 0 ? '<div class="empty" style="padding:32px;text-align:center;color:var(--dim)">Нет подписок</div>' : ''}
      </div>
    </div>

    <!-- USERS TAB -->
    <div class="panel" id="tab-users">
      <div class="search-row">
        <input type="text" id="userSearch" placeholder="Поиск по email, никнейму, UID..." oninput="filterUsers()">
      </div>
      <div class="card" style="padding:0;overflow:hidden">
        <table>
          <thead>
            <tr><th>Никнейм</th><th>Email</th><th>UID</th><th>HWID</th><th>Подписок</th></tr>
          </thead>
          <tbody id="usersTbody">
            ${Object.entries(profiles).map(([uid, p]) => {
              const userSubs = subs.filter(s => s.user_id === uid && !isExpired(s.expires_at));
              return `<tr data-search="${p.email || ''} ${p.nickname || ''} ${uid}">
                <td style="font-weight:600">${p.nickname || '—'}</td>
                <td style="color:var(--dim)">${p.email || '—'}</td>
                <td><div class="uid-cell" title="${uid}" onclick="copyText('${uid}')">${uid}</div></td>
                <td style="font-family:monospace;font-size:11px;color:var(--dim)">${p.hwid ? p.hwid.substring(0,16)+'...' : 'Нет'}</td>
                <td><span class="badge ${userSubs.length > 0 ? 'badge-active' : 'badge-expired'}">${userSubs.length} активных</span></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
        ${Object.keys(profiles).length === 0 ? '<div style="padding:32px;text-align:center;color:var(--dim)">Нет пользователей</div>' : ''}
      </div>
    </div>

    <!-- ADD SUBSCRIPTION TAB -->
    <div class="panel" id="tab-add">
      <div class="card" style="max-width:480px">
        <div class="card-title">Добавить подписку</div>
        <div class="field-row">
          <label>UID пользователя</label>
          <input type="text" id="addUid" placeholder="Скопируй из таблицы Пользователи или из кабинета">
        </div>
        <div class="field-row">
          <label>Или найди по email</label>
          <div style="display:flex;gap:8px">
            <input type="email" id="searchEmail" placeholder="user@mail.ru" style="flex:1">
            <button class="btn btn-ghost btn-sm" id="findUserBtn">Найти</button>
          </div>
          <div id="foundUser" style="font-size:12px;color:var(--green);margin-top:4px;min-height:16px"></div>
        </div>
        <div class="field-row">
          <label>План</label>
          <select id="addPlan">
            <option value="1165_basic">Basic 1.16.5 — 299₽/мес</option>
            <option value="1165_premium">Premium 1.16.5 — 499₽/мес</option>
            <option value="1165_lifetime">Lifetime 1.16.5 — 699₽</option>
            <option value="1214_basic">Basic 1.21.4 — 599₽/мес</option>
            <option value="1214_premium" selected>Premium 1.21.4 — 799₽/мес</option>
            <option value="1214_lifetime">Lifetime 1.21.4 — 999₽</option>
          </select>
        </div>
        <div class="field-row" id="expiresRow">
          <label>Срок действия</label>
          <select id="addDuration">
            <option value="30">30 дней</option>
            <option value="60">60 дней</option>
            <option value="90">90 дней</option>
            <option value="180">180 дней</option>
            <option value="365">1 год</option>
            <option value="0">Навсегда (Lifetime)</option>
          </select>
        </div>
        <button class="btn btn-primary" id="addSubBtn" style="width:100%;justify-content:center;margin-top:4px">Добавить подписку</button>
      </div>
    </div>`;

  // Events
  document.getElementById('refreshBtn').onclick = () => renderAdmin();
  document.getElementById('logoutBtn').onclick  = () => signOut(auth).then(() => window.location.href = 'index.html');

  // Auto-hide expires for lifetime plan
  document.getElementById('addPlan').onchange = () => {
    const isLifetime = document.getElementById('addPlan').value.includes('lifetime');
    document.getElementById('expiresRow').style.display = isLifetime ? 'none' : '';
    if (isLifetime) document.getElementById('addDuration').value = '0';
  };

  // Find user by email
  document.getElementById('findUserBtn').onclick = async () => {
    const email = document.getElementById('searchEmail').value.trim().toLowerCase();
    if (!email) return;
    const found = Object.entries(profiles).find(([, p]) => p.email?.toLowerCase() === email);
    if (found) {
      document.getElementById('addUid').value = found[0];
      document.getElementById('foundUser').textContent = `✓ Найден: ${found[1].nickname || email}`;
    } else {
      document.getElementById('foundUser').style.color = 'var(--red)';
      document.getElementById('foundUser').textContent = 'Пользователь не найден';
    }
  };

  // Add subscription
  document.getElementById('addSubBtn').onclick = async () => {
    const uid      = document.getElementById('addUid').value.trim();
    const plan     = document.getElementById('addPlan').value;
    const duration = parseInt(document.getElementById('addDuration').value);
    const btn      = document.getElementById('addSubBtn');

    if (!uid) { toast('Введи UID пользователя', false); return; }

    let expires_at = null;
    if (duration > 0) {
      const d = new Date();
      d.setDate(d.getDate() + duration);
      expires_at = d.toISOString();
    }

    btn.textContent = 'Добавляем...'; btn.disabled = true;
    try {
      await addDoc(collection(db, 'subscriptions'), {
        user_id:    uid,
        plan:       plan,
        expires_at: expires_at,
        created_at: new Date().toISOString()
      });
      toast(`Подписка ${PLAN_LABELS[plan]} добавлена`);
      document.getElementById('addUid').value = '';
      document.getElementById('foundUser').textContent = '';
      setTimeout(() => renderAdmin(), 800);
    } catch(e) {
      toast('Ошибка: ' + e.message, false);
      btn.textContent = 'Добавить подписку'; btn.disabled = false;
    }
  };

  // Make functions global
  window.copyText = copyText;

  window.deleteSub = async (id) => {
    if (!confirm('Удалить подписку?')) return;
    await deleteDoc(doc(db, 'subscriptions', id));
    toast('Подписка удалена');
    setTimeout(() => renderAdmin(), 500);
  };

  window.extendSub = async (id, userId) => {
    const subDoc = await getDoc(doc(db, 'subscriptions', id));
    const data   = subDoc.data();
    const base   = data.expires_at && new Date(data.expires_at) > new Date() ? new Date(data.expires_at) : new Date();
    base.setDate(base.getDate() + 30);
    await updateDoc(doc(db, 'subscriptions', id), { expires_at: base.toISOString() });
    toast('+30 дней добавлено');
    setTimeout(() => renderAdmin(), 500);
  };

  window.switchTab = (name, btn) => {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    btn.classList.add('active');
  };

  window.filterSubs = () => {
    const q = document.getElementById('subSearch').value.toLowerCase();
    document.querySelectorAll('#subsTbody tr').forEach(tr => {
      tr.style.display = tr.dataset.search?.toLowerCase().includes(q) ? '' : 'none';
    });
  };

  window.filterUsers = () => {
    const q = document.getElementById('userSearch').value.toLowerCase();
    document.querySelectorAll('#usersTbody tr').forEach(tr => {
      tr.style.display = tr.dataset.search?.toLowerCase().includes(q) ? '' : 'none';
    });
  };
}

// ── AUTH CHECK ───────────────────────────────────────────────────────────────
// authStateReady() ждёт пока Firebase ТОЧНО определит состояние — без гонки
setPersistence(auth, browserLocalPersistence)
  .then(() => auth.authStateReady())
  .then(async () => {
    const user = auth.currentUser;

    if (!user) {
      window.location.href = 'index.html';
      return;
    }

    console.log('Admin panel: logged in as', user.email);

    if (!ADMIN_EMAILS.includes(user.email)) {
      document.getElementById('mainContainer').innerHTML = `
        <div style="display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:16px">
          <div style="font-size:48px">🚫</div>
          <div style="font-size:18px;font-weight:700">Нет доступа</div>
          <div style="color:var(--dim);font-size:14px">Твой email: <code style="color:var(--accent)">${user.email}</code></div>
          <div style="color:var(--dim);font-size:13px">Добавь его в ADMIN_EMAILS в admin.html</div>
          <a href="dashboard.html" class="btn btn-primary">← В кабинет</a>
        </div>`;
      return;
    }

    document.getElementById('logoutBtn').onclick = () =>
      signOut(auth).then(() => window.location.href = 'index.html');

    await renderAdmin();
  })
  .catch(err => {
    console.error('Auth error:', err);
    window.location.href = 'index.html';
  });
</script>
</body>
</html>
