<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Подтверждение — Fame Client</title>
<link rel="icon" href="../assets/logo2.png">
<style>
:root{--bg:#0f0f11;--card:#151519;--border:rgba(255,255,255,0.086);--text:#ebebf0;--dim:#82828c;--accent:#7c6af7;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:48px 40px;text-align:center;max-width:400px;width:90%;}
.icon{font-size:48px;margin-bottom:20px;}
h1{font-size:22px;font-weight:700;margin-bottom:10px;}
p{font-size:14px;color:var(--dim);line-height:1.6;margin-bottom:28px;}
.btn{display:inline-block;background:var(--accent);color:#fff;text-decoration:none;padding:12px 28px;border-radius:8px;font-size:14px;font-weight:500;transition:opacity .2s;}
.btn:hover{opacity:.85;}
.error-box{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);border-radius:8px;padding:12px 16px;font-size:13px;color:#f87171;margin-bottom:20px;display:none;}
</style>
</head>
<body>
<div class="card">
  <div class="icon" id="icon">⏳</div>
  <h1 id="title">Подтверждение...</h1>
  <p id="desc">Обрабатываем твой запрос</p>
  <div class="error-box" id="error-box"></div>
  <a class="btn" href="../dashboard.html" id="action-btn" style="display:none;">Войти в кабинет</a>
</div>

<script src="../assets/config.js"></script>
<script>
// Supabase sends tokens in the URL hash after email confirmation
// Format: #access_token=...&refresh_token=...&type=signup (or recovery)
(async function() {
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);

  const accessToken  = params.get('access_token');
  const refreshToken = params.get('refresh_token');
  const type         = params.get('type'); // signup | recovery | email_change

  const icon    = document.getElementById('icon');
  const title   = document.getElementById('title');
  const desc    = document.getElementById('desc');
  const btn     = document.getElementById('action-btn');
  const errBox  = document.getElementById('error-box');

  function showError(msg) {
    icon.textContent = '❌';
    title.textContent = 'Ошибка';
    desc.textContent = 'Что-то пошло не так';
    errBox.textContent = msg;
    errBox.style.display = 'block';
    btn.textContent = 'На главную';
    btn.href = '../index.html';
    btn.style.display = 'inline-block';
  }

  if (!accessToken) {
    // Maybe it's a PKCE flow — check query params too
    const qp = new URLSearchParams(window.location.search);
    const code = qp.get('code');
    if (code) {
      // Exchange code for session
      try {
        const r = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=pkce', {
          method: 'POST',
          headers: {'Content-Type':'application/json','apikey':SUPABASE_ANON},
          body: JSON.stringify({auth_code: code})
        });
        const data = await r.json();
        if (data.access_token) {
          localStorage.setItem('fame_token', data.access_token);
          localStorage.setItem('fame_refresh', data.refresh_token || '');
          localStorage.setItem('fame_user', JSON.stringify(data.user));
          icon.textContent = '✅';
          title.textContent = 'Email подтверждён!';
          desc.textContent = 'Аккаунт активирован. Можешь войти в личный кабинет.';
          btn.style.display = 'inline-block';
          setTimeout(() => window.location.href = '../dashboard.html', 2000);
        } else {
          showError(data.error_description || data.msg || 'Не удалось подтвердить email');
        }
      } catch(e) { showError('Ошибка сети: ' + e.message); }
    } else {
      showError('Токен не найден. Попробуй перейти по ссылке из письма ещё раз.');
    }
    return;
  }

  // We have access_token directly in hash
  try {
    // Get user info
    const r = await fetch(SUPABASE_URL + '/auth/v1/user', {
      headers: {'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + accessToken}
    });
    const userData = await r.json();

    if (userData.id) {
      localStorage.setItem('fame_token', accessToken);
      localStorage.setItem('fame_refresh', refreshToken || '');
      localStorage.setItem('fame_user', JSON.stringify(userData));

      if (type === 'recovery') {
        icon.textContent = '🔑';
        title.textContent = 'Сброс пароля';
        desc.textContent = 'Ты вошёл через ссылку восстановления. Смени пароль в кабинете.';
      } else {
        icon.textContent = '✅';
        title.textContent = 'Email подтверждён!';
        desc.textContent = 'Аккаунт активирован. Перенаправляем в кабинет...';
        setTimeout(() => window.location.href = '../dashboard.html', 2000);
      }
      btn.style.display = 'inline-block';
    } else {
      showError(userData.error_description || 'Не удалось получить данные пользователя');
    }
  } catch(e) { showError('Ошибка: ' + e.message); }
})();
</script>
</body>
</html>
